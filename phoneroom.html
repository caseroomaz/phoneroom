<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PhoneRoom PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.04);
}

header h1{
color:#00ffd5;
font-size:18px;
}

/* FILTER + SEARCH */
.topbar{
display:flex;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
position:relative;
}

.card.vip{
border:2px solid gold;
box-shadow:0 0 15px gold;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:8px;
font-size:14px;
}

.price{
margin:0 8px;
color:#00ffd5;
font-weight:bold;
}

.btn{
width:90%;
margin:6px auto;
display:block;
padding:9px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.buy{
background:linear-gradient(90deg,#00ffd5,#00a6ff);
color:black;
}

/* ADMIN */
.admin{
display:none;
padding:15px;
}

.admin input, .admin select{
width:100%;
margin:5px 0;
padding:10px;
}

/* LOGIN */
.login{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.login-box{
background:#0f172a;
padding:20px;
width:90%;
max-width:300px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
}

.box{
background:#0f172a;
padding:15px;
width:90%;
max-width:320px;
border-radius:12px;
}

textarea,input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

.seller-box{
padding:15px;
background:#0b1220;
}
</style>
</head>

<body>

<header>
<h1>📱 PhoneRoom PRO</h1>
<button onclick="openLogin()">Admin</button>
</header>

<!-- SEARCH + FILTER -->
<div class="topbar">
<input id="search" oninput="render()" placeholder="Axtar...">
<select id="filter" onchange="render()">
<option value="all">Hamısı</option>
<option value="iPhone">iPhone</option>
<option value="Samsung">Samsung</option>
<option value="Xiaomi">Xiaomi</option>
</select>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Admin Panel</h3>
<input id="name" placeholder="Model">
<input id="price" placeholder="Qiymət">
<input id="img" type="file">
<select id="brand">
<option>iPhone</option>
<option>Samsung</option>
<option>Xiaomi</option>
</select>
<label>VIP?</label>
<select id="vip">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
<button onclick="addPhone()">Əlavə et</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="list"></div>

<!-- SELLERS PANEL -->
<div class="seller-box">
<h3>📦 SATANLAR (müraciət)</h3>
<p>Burada satmaq istəyənlər WhatsApp-a yönləndirilir</p>
<button onclick="sell()">SAT</button>
</div>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>Admin Login</h3>
<input type="password" id="pass">
<button onclick="checkPass()">Giriş</button>
</div>
</div>

<!-- BUY MODAL -->
<div class="modal" id="modal">
<div class="box">
<h3>AL MÜRACİƏTİ</h3>
<textarea id="info" placeholder="Telefon haqqında yazı..."></textarea>
<input id="phone" placeholder="Sənin nömrən">
<button class="btn buy" onclick="sendWhatsApp()">Göndər</button>
</div>
</div>

<script>

let phones = JSON.parse(localStorage.getItem("phones")) || [];

let selected = "";

function render(){
let list = document.getElementById("list");
list.innerHTML = "";

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

phones
.sort((a,b)=> (b.vip==="yes") - (a.vip==="yes"))
.filter(p=>{
return (filter==="all" || p.brand===filter) &&
p.name.toLowerCase().includes(search);
})
.forEach(p=>{

list.innerHTML += `
<div class="card ${p.vip==="yes"?'vip':''}">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
<button class="btn buy" onclick="buy('${p.name}')">AL</button>
</div>`;
});
}

render();

/* BUY */
function buy(name){
selected = name;
document.getElementById("modal").style.display="flex";
}

/* SELL */
function sell(){
let url = "https://wa.me/994703099330?text=" +
encodeURIComponent("SATMAQ istəyirəm");

window.open(url,"_blank");
}

/* SEND BUY */
function sendWhatsApp(){
let phone = document.getElementById("phone").value;
let info = document.getElementById("info").value;

let device = navigator.userAgent;

let url = "https://wa.me/994703099330?text=" +
encodeURIComponent(
"AL: " + selected +
"\nNömrə: " + phone +
"\nInfo: " + info +
"\nDevice: " + device
);

window.open(url,"_blank");
document.getElementById("modal").style.display="none";
}

/* LOGIN */
function openLogin(){
document.getElementById("login").style.display="flex";
}

const SECRET = "1234";

function checkPass(){
if(document.getElementById("pass").value===SECRET){
document.getElementById("admin").style.display="block";
document.getElementById("login").style.display="none";
}else alert("Səhv");
}

/* IMAGE UPLOAD */
function addPhone(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let brand = document.getElementById("brand").value;
let vip = document.getElementById("vip").value;

let file = document.getElementById("img").files[0];
let reader = new FileReader();

reader.onload = function(){
phones.push({
name,price,brand,vip,
img:reader.result
});

localStorage.setItem("phones",JSON.stringify(phones));
render();
}

reader.readAsDataURL(file);
}

</script>

</body>
</html>

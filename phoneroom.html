<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneRoom PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111a2e;
}

header h1{
color:#00ffd5;
font-size:18px;
}

/* SEARCH */
.search{
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.search input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
}

.filter-btn{
padding:8px 10px;
border:none;
border-radius:8px;
background:#1f2a44;
color:white;
cursor:pointer;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

/* CARD */
.card{
background:#121a2b;
border-radius:14px;
overflow:hidden;
border:1px solid #1f2a44;
cursor:pointer;
position:relative;
}

.card.vip{
border:2px solid gold;
box-shadow:0 0 10px gold;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
font-size:13px;
margin:6px;
}

.price{
color:#00ffd5;
margin:0 6px;
font-weight:bold;
}

.vip-tag{
position:absolute;
top:8px;
left:8px;
background:gold;
color:black;
font-size:10px;
padding:3px 6px;
border-radius:6px;
}

/* BUTTON */
.btn{
width:90%;
margin:6px auto;
display:block;
padding:9px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.buy{
background:linear-gradient(90deg,#00ffd5,#00a6ff);
color:black;
}

/* SELL FLOAT */
.sell-float{
position:fixed;
bottom:20px;
right:20px;
background:#ff3b3b;
color:white;
padding:12px 15px;
border-radius:50px;
border:none;
font-weight:bold;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111a2e;
padding:15px;
border-radius:12px;
width:90%;
max-width:320px;
}

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
}

/* LOGIN */
.login{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.login-box{
background:#111a2e;
padding:20px;
border-radius:12px;
width:90%;
max-width:300px;
}
</style>
</head>

<body>

<header>
<h1>📱 PhoneRoom PRO</h1>
<button onclick="openLogin()">Admin</button>
</header>

<!-- SEARCH -->
<div class="search">
<input id="search" placeholder="Axtar..." oninput="render()">
<button class="filter-btn" onclick="setFilter('all')">All</button>
<button class="filter-btn" onclick="setFilter('iPhone')">iPhone</button>
<button class="filter-btn" onclick="setFilter('Samsung')">Samsung</button>
<button class="filter-btn" onclick="setFilter('Xiaomi')">Xiaomi</button>
</div>

<!-- ADMIN -->
<div class="login" id="login">
<div class="login-box">
<h3>Admin</h3>
<input type="password" id="pass" placeholder="Şifrə">
<button onclick="checkPass()">Giriş</button>
</div>
</div>

<div id="admin" style="display:none;padding:10px;">
<h3>Admin Panel</h3>
<input id="name" placeholder="Ad">
<input id="price" placeholder="Qiymət">
<input id="img" placeholder="Şəkil URL">
<textarea id="desc" placeholder="Məlumat"></textarea>
<label>VIP <input type="checkbox" id="vip"></label>
<button onclick="addPhone()">Əlavə et</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="list"></div>

<!-- SELL BUTTON -->
<button class="sell-float" onclick="openSell()">SAT</button>

<!-- MODAL BUY -->
<div class="modal" id="modal">
<div class="box">
<h3>AL Müraciət</h3>
<input id="phone" placeholder="Sənin nömrən">
<button class="btn buy" onclick="sendBuy()">WhatsApp göndər</button>
</div>
</div>

<!-- MODAL SELL -->
<div class="modal" id="sellModal">
<div class="box">
<h3>Satış Müraciəti</h3>
<input id="sellPhone" placeholder="Sənin nömrən">
<input id="sellName" placeholder="Telefon adı">
<button class="btn buy" onclick="sendSell()">Göndər</button>
</div>
</div>

<!-- DETAILS -->
<div class="modal" id="detailModal">
<div class="box">
<h3 id="dname"></h3>
<p id="ddesc"></p>
<p id="dprice" style="color:#00ffd5"></p>
<button class="btn buy" onclick="closeDetail()">Bağla</button>
</div>
</div>

<script>

let phones = JSON.parse(localStorage.getItem("phones")) || [];

let selected="";
let filter="all";
let selectedItem=null;

function render(){
let list=document.getElementById("list");
list.innerHTML="";

let search=document.getElementById("search").value.toLowerCase();

phones
.filter(p=>{
return (filter==="all" || p.name.includes(filter))
&& p.name.toLowerCase().includes(search);
})
.forEach((p,i)=>{

list.innerHTML+=`
<div class="card ${p.vip?'vip':''}" onclick="openDetail(${i})">
${p.vip?'<div class="vip-tag">VIP</div>':''}
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
<button class="btn buy" onclick="event.stopPropagation();buy('${p.name}')">AL</button>
</div>
`;
});
}

function setFilter(f){filter=f;render();}

function buy(name){
selected=name;
document.getElementById("modal").style.display="flex";
}

function sendBuy(){
let phone=document.getElementById("phone").value;
let url=`https://wa.me/994703099330?text=${encodeURIComponent("AL: "+selected+" | Müştəri: "+phone+" | Device: "+navigator.userAgent)}`;
window.open(url,"_blank");
}

function openSell(){
document.getElementById("sellModal").style.display="flex";
}

function sendSell(){
let phone=document.getElementById("sellPhone").value;
let name=document.getElementById("sellName").value;
let url=`https://wa.me/994703099330?text=${encodeURIComponent("SAT: "+name+" | Tel: "+phone)}`;
window.open(url,"_blank");
}

function openDetail(i){
selectedItem=phones[i];
document.getElementById("dname").innerText=selectedItem.name;
document.getElementById("ddesc").innerText=selectedItem.desc || "";
document.getElementById("dprice").innerText=selectedItem.price;
document.getElementById("detailModal").style.display="flex";
}

function closeDetail(){
document.getElementById("detailModal").style.display="none";
}

/* ADMIN */
function openLogin(){
document.getElementById("login").style.display="flex";
}

function checkPass(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("admin").style.display="block";
document.getElementById("login").style.display="none";
}
}

function addPhone(){
phones.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
img:document.getElementById("img").value,
desc:document.getElementById("desc").value,
vip:document.getElementById("vip").checked
});

localStorage.setItem("phones",JSON.stringify(phones));
render();
}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneRoom PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.04);
}

header h1{color:#00ffd5;font-size:18px;}

/* SEARCH + FILTER */
.topbar{
display:flex;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

.topbar input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.topbar button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00ffd5;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{transform:scale(1.03);transition:0.3s;}

.card img{
width:100%;
height:240px;   /* 3:4 uzun şəkil */
object-fit:cover;
}

.card h3{margin:8px;font-size:14px;}

.price{margin:0 8px;color:#00ffd5;font-weight:bold;font-size:13px;}

.desc{
margin:5px 8px;
font-size:12px;
opacity:0.7;
}

/* BUTTONS */
.btn{
width:92%;
margin:6px auto;
display:block;
padding:9px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.al{
background:linear-gradient(90deg,#00ffd5,#00a6ff);
color:black;
}

.sell-float{
position:fixed;
bottom:20px;
right:20px;
background:#ff3b3b;
color:white;
padding:14px;
border-radius:50px;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
padding:15px;
background:#0b1220;
}

.admin input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

.admin button{
width:100%;
padding:10px;
background:#00ffd5;
border:none;
border-radius:8px;
}

/* LOGIN */
.login{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.login-box{
background:#0f172a;
padding:20px;
width:90%;
max-width:300px;
border-radius:12px;
}

</style>
</head>

<body>

<header>
<h1>📱 PhoneRoom PRO</h1>
<button onclick="openLogin()">Admin</button>
</header>

<!-- SEARCH + FILTER -->
<div class="topbar">
<input id="search" onkeyup="render()" placeholder="Axtar...">
<button onclick="filter='all';render()">Hamısı</button>
<button onclick="filter='iPhone';render()">iPhone</button>
<button onclick="filter='Samsung';render()">Samsung</button>
<button onclick="filter='Xiaomi';render()">Xiaomi</button>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Admin Panel</h3>
<input id="name" placeholder="Telefon adı">
<input id="price" placeholder="Qiymət">
<input id="desc" placeholder="Telefon haqqında məlumat">
<input id="img" type="file">
<button onclick="addPhone()">Əlavə et</button>
</div>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>Admin Login</h3>
<input type="password" id="pass">
<button onclick="checkPass()">Giriş</button>
</div>
</div>

<!-- PRODUCTS -->
<div class="container" id="list"></div>

<!-- SELL FLOAT -->
<div class="sell-float" onclick="sellGlobal()">SAT</div>

<script>

let phones = JSON.parse(localStorage.getItem("phones")) || [];

let selected="";
let filter="all";

/* RENDER */
function render(){
let list=document.getElementById("list");
let search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

phones
.filter(p=>{
return (filter==="all" || (p.name||"").includes(filter));
})
.filter(p=>{
return (p.name+p.price+p.desc).toLowerCase().includes(search);
})
.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
<p class="desc">${p.desc}</p>

<button class="btn al" onclick="buy('${p.name}')">AL</button>
</div>
`;
});
}

render();

/* BUY -> WHATSAPP */
function buy(name){
let userInfo = navigator.userAgent;
let phone = prompt("Sənin nömrən (opsional)");

let msg = `AL MÜRACİƏT:%0A${name}%0AUser:${userInfo}%0ANömrə:${phone}`;

window.open("https://wa.me/994703099330?text="+encodeURIComponent(msg));
}

/* SELL */
function sellGlobal(){
let name = prompt("Nə satırsan?");
let price = prompt("Qiymət?");
let phone = prompt("Sənin nömrən");

let msg = `SAT MÜRACİƏT:%0A${name}%0AQiymət:${price}%0ANömrə:${phone}`;

window.open("https://wa.me/994703099330?text="+encodeURIComponent(msg));
}

/* IMAGE UPLOAD */
function addPhone(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let desc=document.getElementById("desc").value;
let file=document.getElementById("img").files[0];

let reader=new FileReader();

reader.onload=function(){
phones.push({
name,
price,
desc,
img:reader.result
});

localStorage.setItem("phones",JSON.stringify(phones));
render();
}

reader.readAsDataURL(file);
}

/* ADMIN */
function openLogin(){
document.getElementById("login").style.display="flex";
}

const SECRET="1234";

function checkPass(){
let pass=document.getElementById("pass").value;
if(pass===SECRET){
document.getElementById("admin").style.display="block";
document.getElementById("login").style.display="none";
}else alert("Səhv!");
}

</script>

</body>
</html>

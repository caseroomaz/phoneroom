<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneRoom VIP Market</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b1220;color:white;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0a0f1c;
border-bottom:1px solid #222;
}

header h1{color:#00ffd5;font-size:18px;}

/* SEARCH */
.topBar{
display:flex;
gap:10px;
padding:10px;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
width:100%;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111827;
border-radius:12px;
overflow:hidden;
border:1px solid #222;
position:relative;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{margin:8px;}

.price{margin:0 8px;color:#00ffd5;font-weight:bold;}

/* VIP */
.vip{
position:absolute;
top:10px;
left:10px;
background:gold;
color:black;
padding:4px 8px;
font-size:11px;
border-radius:6px;
}

/* BOOST */
.boost{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
padding:4px 8px;
font-size:11px;
border-radius:6px;
}

/* BUTTONS */
.btn{
width:92%;
margin:6px auto;
display:block;
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.buy{background:#00ffd5;color:black;}
.sell{background:#ff3b3b;color:white;}

/* ADMIN */
.admin{
display:none;
padding:10px;
background:#0a0f1c;
}

</style>

</head>

<body>

<header>
<h1>📱 PhoneRoom VIP</h1>
<button onclick="loginAdmin()">Admin</button>
</header>

<!-- SEARCH + FILTER -->
<div class="topBar">
<input id="search" placeholder="Axtar..." oninput="render()">

<select id="filter" onchange="render()">
<option value="all">Hamısı</option>
<option value="iphone">iPhone</option>
<option value="samsung">Samsung</option>
<option value="xiaomi">Xiaomi</option>
</select>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="admin">
<h3>Admin Panel</h3>
<input id="name" placeholder="Telefon adı">
<input id="price" placeholder="Qiymət">
<input id="img" placeholder="Şəkil URL">
<select id="vip">
<option value="no">Normal</option>
<option value="yes">VIP</option>
</select>
<button onclick="addProduct()">Əlavə et</button>
</div>

<div class="container" id="list"></div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOAD DATA */
let products = [];

db.ref("phones").on("value", snap=>{
products = snap.val() ? Object.values(snap.val()) : [];
render();
});

/* RENDER */
function render(){

let list = document.getElementById("list");
let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

list.innerHTML = "";

let filtered = products
.filter(p=>p.name.toLowerCase().includes(search))
.filter(p=>{
if(filter==="all") return true;
return p.name.toLowerCase().includes(filter);
})
.sort((a,b)=>(b.vip==="yes") - (a.vip==="yes")); // BOOST SYSTEM

filtered.forEach(p=>{

list.innerHTML += `
<div class="card">

${p.vip==="yes" ? `<div class="vip">VIP</div>` : ""}
${p.vip==="yes" ? `<div class="boost">BOOST</div>` : ""}

<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">${p.price}</div>

<button class="btn buy" onclick="buy('${p.name}')">AL</button>
<button class="btn sell" onclick="sell('${p.name}')">SAT</button>

</div>
`;
});

}

/* BUY SELL */
function buy(name){
window.open("https://wa.me/994501234567?text=AL: "+name,"_blank");
}

function sell(name){
window.open("https://wa.me/994501234567?text=SAT: "+name,"_blank");
}

/* ADMIN LOGIN */
function loginAdmin(){
let pass = prompt("Admin password:");
if(pass==="1234"){
document.getElementById("admin").style.display="block";
}
}

/* ADD PRODUCT */
function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let img = document.getElementById("img").value;
let vip = document.getElementById("vip").value;

let id = Date.now();

db.ref("phones/"+id).set({
name,price,img,vip
});

alert("Elan əlavə olundu!");
}

</script>

</body>
</html>
